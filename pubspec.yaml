name: autonomix
description: A Linux package manager for GitHub releases
publish_to: 'none'
version: 0.3.10-b3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.0.0
  
  # Networking
  http: ^1.1.0
  
  # Storage
  path: ^1.8.0
  
  # System integration
  path_provider: ^2.1.0
  process_run: ^1.3.0
  xdg_directories: ^1.0.0
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.2
  logger: ^2.7.0
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
