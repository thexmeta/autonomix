name: Build and Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - format: debian
            script: ./scripts/create-debian-package.sh
          - format: rpm
            script: ./scripts/create-rpm-package.sh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev libgcrypt20-dev \
            libsecret-1-dev libjsoncpp-dev \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            dpkg-dev rpm imagemagick

      - name: Verify Flutter toolchain
        run: flutter doctor -v

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build ${{ matrix.format }} package
        run: |
          chmod +x ${{ matrix.script }}
          ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.format }}-package
          path: dist/${{ matrix.format }}-*/**/*
          retention-days: 1

  create-release:
    needs: build-packages
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" \) -exec cp {} release-files/ \;
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ### 📦 Installation
            
            **Debian/Ubuntu:**
            ```bash
            sudo dpkg -i autonomix_*_amd64.deb
            ```
            
            **Fedora/RHEL/CentOS:**
            ```bash
            sudo rpm -i autonomix-*.x86_64.rpm
            ```
